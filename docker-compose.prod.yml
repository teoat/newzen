version: '3.8'

services:
  # ---------------------------------------------------------------------------
  # REVERSE PROXY (NGINX)
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: zenith_proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

  # ---------------------------------------------------------------------------
  # FRONTEND (Next.js)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: zenith_frontend
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:80/api # Public via Nginx
      - API_URL=http://backend:8000 # Internal for SSR
      - NODE_ENV=production
    expose:
      - "3000"

  # ---------------------------------------------------------------------------
  # BACKEND (FastAPI)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: zenith_backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://zenith:zenith@db:5432/zenith_lite
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - ENVIRONMENT=production
    depends_on:
      - db
      - redis
    expose:
      - "8000"

  # ---------------------------------------------------------------------------
  # BACKGROUND WORKER (Celery)
  # ---------------------------------------------------------------------------
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: zenith_worker
    restart: always
    command: [ "/app/scripts/start-worker.sh" ]
    environment:
      - DATABASE_URL=postgresql://zenith:zenith@db:5432/zenith_lite
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - SECRET_KEY=${SECRET_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ENVIRONMENT=production
    depends_on:
      - db
      - redis
      - backend

  # ---------------------------------------------------------------------------
  # DATABASE (PostgreSQL)
  # ---------------------------------------------------------------------------
  db:
    image: postgres:15-alpine
    container_name: zenith_db
    restart: always
    environment:
      - POSTGRES_USER=zenith
      - POSTGRES_PASSWORD=zenith
      - POSTGRES_DB=zenith_lite
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"

  # ---------------------------------------------------------------------------
  # CACHE & QUEUE (Redis)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: zenith_redis
    restart: always
    expose:
      - "6379"

volumes:
  postgres_data:
