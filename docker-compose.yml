services:
  backend:
    build: ./backend
    container_name: zenith_backend
    ports:
      - "8200:8000"
    volumes:
      - ./backend:/app
      - /app/venv
    environment:
      - DATABASE_URL=postgresql://zenith:zenith@db:5432/zenith_lite
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=changesme_in_prod_please
    depends_on:
      - db
      - redis
    networks:
      - zenith_net

  worker:
    build: ./backend
    container_name: zenith_worker
    command: python run_autonomy.py
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql://zenith:zenith@db:5432/zenith_lite
      - REDIS_URL=redis://redis:6379
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - db
      - redis
    networks:
      - zenith_net

  redis:
    image: redis:7.2-alpine
    container_name: zenith_redis
    networks:
      - zenith_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: zenith_frontend
    ports:
      - "3200:3000"
      - "9090:9090"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8200
      - API_URL=http://backend:8000
      - WATCHPACK_POLLING=true
      - NEXT_PUBLIC_SENTRY_DSN=${NEXT_PUBLIC_SENTRY_DSN}
      - SENTRY_ORG=${SENTRY_ORG}
      - SENTRY_PROJECT=${SENTRY_PROJECT}
      - SENTRY_AUTH_TOKEN=${SENTRY_AUTH_TOKEN}
      - NEXT_PUBLIC_APP_VERSION=${NEXT_PUBLIC_APP_VERSION}
      - PROMETHEUS_ENABLED=${PROMETHEUS_ENABLED:-true}
    depends_on:
      - backend
    networks:
      - zenith_net
    command: npm run dev

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: zenith_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    networks:
      - zenith_net
    depends_on:
      - frontend

  grafana:
    image: grafana/grafana:10.2.0
    container_name: zenith_grafana
    ports:
      - "3100:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    networks:
      - zenith_net
    depends_on:
      - prometheus

  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: zenith_alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=http://localhost:9093'
    networks:
      - zenith_net
    depends_on:
      - prometheus

  db:
    image: postgres:15-alpine
    container_name: zenith_db
    environment:
      - POSTGRES_USER=zenith
      - POSTGRES_PASSWORD=zenith
      - POSTGRES_DB=zenith_lite
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5442:5432"
    networks:
      - zenith_net

networks:
  zenith_net:
    driver: bridge

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  alertmanager_data:
