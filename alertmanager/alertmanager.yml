route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical'
      continue: true
    - match:
        severity: warning
      receiver: 'default'
    - match:
        alertname: 'Watchdog'
      receiver: 'default'

receivers:
  - name: 'default'
    webhook_configs:
      - url: '${SLACK_WEBHOOK_URL:-http://localhost:5001}'
        send_resolved: true
        max_alerts: 10
    email_configs:
      - to: '${ALERT_EMAIL:-ops@zenith.app}'
        send_resolved: true
        require_tls: false
        smtp_auth_username: '${SMTP_USERNAME:-}'
        smtp_auth_password: '${SMTP_PASSWORD:-}'
        smtp_smarthost: '${SMTP_HOST:-localhost:25}'
        from: 'alertmanager@zenith.app'

  - name: 'critical'
    webhook_configs:
      - url: '${PAGERDUTY_WEBHOOK_URL:-}'
        send_resolved: true
        severity: critical
    pagerduty_configs:
      - service_key: '${PAGERDUTY_SERVICE_KEY:-}'
        severity: critical
        details:
          firing: '{{ .Status }}'
          num_firing: '{{ .Alerts.Firing | len }}'
          num_resolved: '{{ .Alerts.Resolved | len }}'

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']

  - source_match:
      alertname: 'NodeDown'
    target_match:
      alertname: 'TargetDown'
    equal: ['instance']

  - source_match:
      severity: 'critical'
    target_match:
      severity: 'info'
    equal: ['alertname']
