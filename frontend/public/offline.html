<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith | Offline Field Mode</title>
    <style>
        body {
            background: #020617;
            color: #94a3b8;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            border: 1px solid #1e293b;
            padding: 40px;
            border-radius: 24px;
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(20px);
            max-width: 400px;
        }
        h1 {
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-size: 18px;
            margin-bottom: 8px;
        }
        p {
            font-size: 13px;
            line-height: 1.6;
        }
        .icon {
            color: #6366f1;
            margin-bottom: 20px;
            font-size: 40px;
        }
        .btn {
            background: #4f46e5;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.1em;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📡</div>
        <h1>Field Mode Active</h1>
        <p>Connectivity to the central forensic vault has been lost. System is currently operating in local field mode. Evidence upload and AI analysis are paused.</p>
        <button class="btn" onclick="window.location.reload()">Retry Connection</button>
    </div>
</body>
</html>
