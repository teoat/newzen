version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - mock-api
    networks:
      - zenith-network

  mock-api:
    image: node:20-alpine
    working_dir: /app
    command: >
      sh -c "npx json-server --watch /api-mock/db.json --port 8200 --routes /api-mock/routes.json"
    ports:
      - "8200:8200"
    volumes:
      - ./api-mock:/api-mock:ro
    networks:
      - zenith-network

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: zenith
      POSTGRES_PASSWORD: zenith_dev
      POSTGRES_DB: zenith_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - zenith-network

networks:
  zenith-network:
    driver: bridge

volumes:
  postgres_data:
