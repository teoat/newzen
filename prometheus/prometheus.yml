global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'zenith-lite'
    env: '${ENV:-development}'

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093
      timeout: 10s
      api_version: v2

rule_files:
  - '/etc/prometheus/rules/*.yml'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: /metrics

  - job_name: 'zenith-lite'
    static_configs:
      - targets:
          - frontend:9090
    metrics_path: /api/metrics
    scrape_interval: 30s
    scrape_timeout: 10s
    scheme: http
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'zenith-frontend'

  - job_name: 'zenith-backend'
    static_configs:
      - targets:
          - backend:8000
    metrics_path: /metrics
    scrape_interval: 30s
    scrape_timeout: 10s

  - job_name: 'node-exporter'
    static_configs:
      - targets:
          - node-exporter:9100
    scrape_interval: 15s

  - job_name: 'postgres-exporter'
    static_configs:
      - targets:
          - postgres-exporter:9187
    scrape_interval: 30s
