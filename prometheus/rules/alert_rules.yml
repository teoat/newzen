groups:
  - name: zenith-lite-alerts
    rules:
      - alert: ZenithFrontendDown
        expr: up{job="zenith-lite"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Zenith frontend is down"
          description: "The Zenith frontend service has been down for more than 1 minute."

      - alert: ZenithBackendDown
        expr: up{job="zenith-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Zenith backend is down"
          description: "The Zenith backend service has been down for more than 1 minute."

      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate detected"
          description: "More than 5% of requests are returning 5xx errors."

      - alert: HighResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High response time"
          description: "95th percentile response time is above 5 seconds."

      - alert: DatabaseConnectionPoolExhausted
        expr: pg_stat_activity_count / pg_settings_max_connections > 0.9
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Database connection pool exhausted"
          description: "More than 90% of database connections are in use."

      - alert: RedisMemoryHigh
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory usage high"
          description: "Redis memory usage is above 90%."

  - name: zenith-lite-recording
    rules:
      - record: zenith:http_requests:rate5m
        expr: rate(http_requests_total[5m])

      - record: zenith:http_request_duration:p95
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m]))

      - record: zenith:errors:ratio5m
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m])
